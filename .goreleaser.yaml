# GoReleaser configuration for VORTEX (build plan M1.6).
#
# Produces static, single-binary releases for every supported platform and
# publishes them with SHA-256 checksums and an auto-generated changelog on each
# v* tag. CGO is disabled so the binaries are fully static and cross-compile
# cleanly. Run `goreleaser check` to validate, `goreleaser release --snapshot
# --clean` to build all platforms locally without publishing.
#
# M19 adds supply-chain hardening: each archive gets an SPDX SBOM generated by
# syft (must be on PATH — the release workflow installs it), and checksums.txt
# covers every artifact so `vortex verify` and scripts/verify-release.sh can
# validate downloads end-to-end.
version: 2

project_name: vortex

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: vortex
    main: ./cmd/vortex
    binary: vortex
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
      # The `release` tag makes the human-approval gate on agent command
      # execution unwaivable in shipped binaries (production audit I6).
      # Without it a struct literal that omits RequireApproval — whose zero
      # value is false — yields an ungated command executor.
      - -tags=release
    ldflags:
      - -s -w
      - -X github.com/vortex-run/vortex/internal/cmd.version={{.Version}}
      - -X github.com/vortex-run/vortex/internal/cmd.commit={{.Commit}}
      - -X github.com/vortex-run/vortex/internal/cmd.date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    name_template: >-
      vortex_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md
      - vortex.cue

checksum:
  name_template: checksums.txt
  algorithm: sha256

# Ed25519 signature over checksums.txt (production audit H4). The signing
# private key is provided by the release workflow as VORTEX_SIGNING_KEY (a CI
# secret); the matching public key is pinned in the binary
# (internal/update/signature.go). `vortex self-update` verifies this signature
# before installing. When VORTEX_SIGNING_KEY is unset the signing command is a
# no-op wrapper that skips signing, so unsigned snapshot builds still work.
signs:
  - id: checksums
    cmd: bash
    args:
      - "scripts/sign-ci.sh"
      - "${artifact}"
    artifacts: checksum
    output: true

# SPDX SBOM per archive, generated by syft and uploaded as a release asset
# alongside the archive it describes.
sboms:
  - artifacts: archive
    documents:
      - "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}.sbom.json"

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch
  groups:
    - title: "New features"
      regexp: "^feat"
      order: 0
    - title: "Bug fixes"
      regexp: "^fix"
      order: 1
    - title: "Other"
      order: 999

# Linux distro packages (deb/rpm/apk) built from the same binaries (M20).
nfpms:
  - id: vortex
    package_name: vortex
    vendor: VORTEX Contributors
    homepage: "https://vortex.run"
    maintainer: VORTEX Contributors <maintainers@vortex.run>
    description: VORTEX — autonomous infrastructure platform (proxy, security, AI agent)
    license: Apache-2.0
    formats: [deb, rpm, apk]
    bindir: /usr/bin
    contents:
      - src: vortex.cue
        dst: /etc/vortex/vortex.cue
        type: config|noreplace
      - src: LICENSE
        dst: /usr/share/doc/vortex/LICENSE

# Homebrew cask (M20). Published to vortex-run/homebrew-tap on release.
# (GoReleaser replaced the deprecated `brews:` formula block with casks.)
# Pushing to the tap needs a cross-repo PAT (HOMEBREW_TAP_TOKEN secret) — the
# workflow's GITHUB_TOKEN is scoped to this repo only. When the secret is
# unset the cask is generated but not uploaded, keeping the release green.
homebrew_casks:
  - name: vortex
    skip_upload: '{{ if index .Env "HOMEBREW_TAP_TOKEN" }}{{ if .Env.HOMEBREW_TAP_TOKEN }}false{{ else }}true{{ end }}{{ else }}true{{ end }}'
    repository:
      owner: vortex-run
      name: homebrew-tap
      token: '{{ envOrDefault "HOMEBREW_TAP_TOKEN" "" }}'
    description: "One binary. Any server. Fully autonomous."
    homepage: "https://vortex.run"

release:
  github:
    owner: vortex-run
    name: vortex
  draft: false
  prerelease: auto
  name_template: "VORTEX {{.Tag}}"
