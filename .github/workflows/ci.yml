# VORTEX continuous integration (build plan M1.6).
#
# Runs tests and lint on every push and pull request. The merge gate is
# Non-Negotiable Rule #9: `task test` must pass before merging.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}-${{ github.sha }}
  cancel-in-progress: false

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so `git describe` produces a version

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: task build

      - name: Test
        run: task test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          # Build golangci-lint from source with the job's Go 1.26 toolchain.
          # The prebuilt binaries are compiled with an older Go and refuse to
          # lint a module that targets a newer `go` version (exit code 3).
          install-mode: goinstall

      - name: golangci-lint (integration build tag)
        # The action above lints with default build tags, so //go:build
        # integration files are skipped. Re-run with the tag so those files
        # (integration/*) are checked too. golangci-lint is on PATH from the
        # step above.
        run: golangci-lint run --build-tags integration ./...

  integration:
    name: Integration
    runs-on: ubuntu-latest
    needs: [test] # only run once unit tests pass
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Run integration tests
        # -race so the concurrent agent/bus/runtime paths exercised end-to-end
        # are race-checked (ubuntu-latest has a C toolchain for cgo).
        run: go test -v -race -tags integration -timeout 300s ./integration/...
