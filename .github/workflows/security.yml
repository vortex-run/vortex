# VORTEX security scanning (build plan M19).
#
# Two complementary scanners:
#   - govulncheck: call-graph-aware Go CVE scanning on every push to main and
#     on a weekly schedule, so newly published CVEs against existing code are
#     caught even when nothing is being committed.
#   - dependency-review: blocks PRs that introduce dependencies with known
#     vulnerabilities. The action diffs base vs head, so it only runs on
#     pull_request events.
name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 9 * * 1' # Weekly Monday 9am UTC

permissions:
  contents: read

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/dependency-review-action@v4
