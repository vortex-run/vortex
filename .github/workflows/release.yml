# VORTEX release pipeline (build plan M1.6).
#
# Triggered only by pushing a v* tag. Runs the full race-enabled test suite as a
# gate, then GoReleaser builds the multi-platform binaries and publishes them
# with SHA-256 checksums and an auto-generated changelog to a GitHub release.
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # required for GoReleaser to create the GitHub release

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history is mandatory: GoReleaser derives the changelog from the
          # commits since the previous tag.
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Run tests before release
        run: go test -race ./...

      # syft must be on PATH before GoReleaser runs: the sboms block in
      # .goreleaser.yaml shells out to it for the per-archive SPDX documents.
      - name: Install syft
        run: go install github.com/anchore/syft/cmd/syft@latest

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Ed25519 signing key for checksums.txt (production audit H4). When
          # the secret is unset the sign wrapper no-ops and the release is
          # integrity-only.
          VORTEX_SIGNING_KEY: ${{ secrets.VORTEX_SIGNING_KEY }}

      # Whole-repository SBOM (source dependencies, not just the shipped
      # archives) kept as a workflow artifact for audit/compliance trails.
      - name: Generate SBOM
        run: syft packages . -o spdx-json > vortex-sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: vortex-sbom.json
