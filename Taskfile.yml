# Taskfile for VORTEX — https://taskfile.dev
#
# The README mandates Taskfile (not Makefile) for build commands. Run `task`
# with no args to list available tasks, or `task <name>` to run one.
version: "3"

vars:
  # Output binary name; .exe is appended automatically on Windows by Go, but we
  # set BIN explicitly so paths are predictable across platforms.
  BIN: '{{if eq OS "windows"}}bin/vortex.exe{{else}}bin/vortex{{end}}'
  PKG: ./cmd/vortex
  # Version metadata stamped into the binary via -ldflags.
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "0.0.0-dev"
  COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo "none"
  DATE:
    sh: '{{if eq OS "windows"}}powershell -NoProfile -Command "(Get-Date).ToUniversalTime().ToString(\"yyyy-MM-ddTHH:mm:ssZ\")"{{else}}date -u +%Y-%m-%dT%H:%M:%SZ{{end}}'
  # Version metadata is stamped into the internal/cmd package, where the root
  # command lives (the entrypoint main package no longer holds these vars).
  MOD: github.com/vortex-run/vortex/internal/cmd
  LDFLAGS: >-
    -s -w
    -X {{.MOD}}.version={{.VERSION}}
    -X {{.MOD}}.commit={{.COMMIT}}
    -X {{.MOD}}.date={{.DATE}}

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  build:
    desc: Compile the single vortex binary
    cmds:
      - go build -trimpath -ldflags "{{.LDFLAGS}}" -o "{{.BIN}}" {{.PKG}}
    sources:
      - "**/*.go"
      - go.mod
    generates:
      - "{{.BIN}}"

  ui:
    desc: Open the VORTEX terminal dashboard
    cmds:
      - '"{{.BIN}}" ui'

  ui:start:
    desc: Start VORTEX and open the terminal dashboard
    cmds:
      - '"{{.BIN}}" ui --start'

  tune:show:
    desc: Show recommended OS tuning settings
    cmds:
      - '"{{.BIN}}" tune show'

  tune:apply:
    desc: Apply recommended OS tuning (dry-run)
    cmds:
      - '"{{.BIN}}" tune apply --dry-run'

  bench:
    desc: Run the full benchmark suite
    cmds:
      - '"{{.BIN}}" tune bench'

  bench:save:
    desc: Run benchmarks and save as the new baseline
    cmds:
      - '"{{.BIN}}" tune bench --save'

  dashboard:dev:
    desc: Run the dashboard dev server (proxies API to :9090)
    dir: web/dashboard
    cmds:
      - npm run dev

  dashboard:build:
    desc: Build the dashboard into web/dashboard/dist (embedded into the binary)
    dir: web/dashboard
    cmds:
      - npm run build

  dashboard:build-and-embed:
    desc: Build the dashboard, then build the Go binary with it embedded
    cmds:
      - task: dashboard:build
      - task: build

  run:
    desc: Build and start the VORTEX server
    deps: [build]
    cmds:
      - '"{{.BIN}}" start --config vortex.cue'

  start:
    desc: Start the VORTEX server
    deps: [build]
    cmds:
      - '"{{.BIN}}" start --config vortex.cue'

  stop:
    desc: Stop the running VORTEX server
    cmds:
      - '"{{.BIN}}" stop'

  status:
    desc: Show VORTEX server status
    cmds:
      - '"{{.BIN}}" status'

  check:
    desc: Validate vortex.cue without starting
    cmds:
      - '"{{.BIN}}" check --config vortex.cue'

  service:install:
    desc: Install VORTEX as a system service (requires root on Linux)
    deps: [build]
    cmds:
      - '"{{.BIN}}" service install'

  service:uninstall:
    desc: Remove VORTEX system service
    deps: [build]
    cmds:
      - '"{{.BIN}}" service uninstall'

  service:generate:
    desc: Print the systemd unit file to stdout
    deps: [build]
    cmds:
      - '"{{.BIN}}" service generate --format systemd'

  install:
    desc: Run the installer script (Linux/macOS only)
    cmds:
      - bash scripts/install.sh

  logs:
    desc: Tail VORTEX logs (journald if available, else file)
    cmds:
      - |
        if command -v journalctl >/dev/null 2>&1; then
          journalctl -u vortex -f --output=short-precise
        else
          tail -f /var/log/vortex/vortex.log 2>/dev/null ||
          echo "No log file found. Run: task start"
        fi

  snapshot:
    desc: Build snapshot release locally (all platforms, no publish)
    cmds:
      - goreleaser release --snapshot --clean

  release:check:
    desc: Validate .goreleaser.yaml config
    cmds:
      - goreleaser check

  tag:
    desc: "Create and push a release tag (usage: task tag VERSION=v0.1.0)"
    requires:
      vars: [VERSION]
    cmds:
      - git tag -a {{.VERSION}} -m "Release {{.VERSION}}"
      - git push origin {{.VERSION}}

  update:check:
    desc: Check if a newer VORTEX release is available
    cmds:
      - '"{{.BIN}}" self-update --check'

  update:
    desc: Update VORTEX to the latest release
    cmds:
      - '"{{.BIN}}" self-update --yes'

  test:
    desc: Run all tests (race detector when a C compiler is available)
    vars:
      # The race detector needs cgo, which needs a C compiler. Most Linux/macOS
      # dev and CI machines have one; a stock Windows box often does not. Detect
      # it and enable -race only when usable, so `task test` never fails purely
      # for lack of a C toolchain. CI runs the race detector unconditionally.
      HAS_CC:
        sh: '{{if eq OS "windows"}}powershell -NoProfile -Command "if (Get-Command gcc,clang,cc -ErrorAction SilentlyContinue) {''yes''} else {''no''}"{{else}}command -v cc gcc clang >/dev/null 2>&1 && echo yes || echo no{{end}}'
    cmds:
      - cmd: '{{if eq .HAS_CC "yes"}}go test -race -count=1 ./...{{else}}go test -count=1 ./...{{end}}'

  reload:
    desc: Reload VORTEX configuration without restarting
    cmds:
      - '"{{.BIN}}" reload'

  test:race:
    desc: Run all tests with the race detector (requires a C compiler / cgo)
    env:
      CGO_ENABLED: "1"
    cmds:
      - go test -race -count=1 ./...

  test:integration:
    desc: Run integration tests (starts a real vortex process)
    cmds:
      - go test -v -tags integration -timeout 300s ./integration/...

  test:all:
    desc: Run unit tests + integration tests
    cmds:
      - task: test
      - task: test:integration

  proxy:bench:
    desc: Benchmark TCP tunnel throughput (run for M2.7 decision)
    cmds:
      - go test -bench=BenchmarkTunnel -benchtime=30s -benchmem ./internal/proxy/tcp/...

  lint:
    desc: Run golangci-lint over the whole module
    cmds:
      - golangci-lint run ./...

  vet:
    desc: Run go vet (fast static checks, no external tools)
    cmds:
      - go vet ./...

  security:scan:
    desc: Scan for known vulnerabilities (requires govulncheck)
    cmds:
      - govulncheck ./...

  security:deps:
    desc: List module dependencies for license review
    cmds:
      - go list -m all

  security:all:
    desc: Run all security checks
    cmds:
      - task: security:scan
      - task: lint
      - task: test

  tidy:
    desc: Tidy and verify module dependencies
    cmds:
      - go mod tidy
      - go mod verify

  clean:
    desc: Remove build artifacts and caches
    cmds:
      - '{{if eq OS "windows"}}powershell -NoProfile -Command "Remove-Item -Recurse -Force bin -ErrorAction SilentlyContinue"{{else}}rm -rf bin{{end}}'
      - go clean -cache -testcache
